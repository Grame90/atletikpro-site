            $(function() {
              const ticBySec = 12;
              let counter = 5 * ticBySec;
              let counterMax = counter;
              const $routes = $('.buttonContainer .button-route');
              $routes.attr('disabled', '');
              $('.buttonContainer .arrivalProgress').progressbar({value: 0}).everyTime(1000 / ticBySec, function() {
                if (0 === --counter) {
                  $routes.removeAttr('disabled');
                  $(this).progressbar('destroy').remove();
                } else {
                  $(this).progressbar('value', (1 - counter / counterMax) * 100);
                }
              }, counter);
            });

            $(this).toggleClass('hover');
          }
        });
      });
    });
